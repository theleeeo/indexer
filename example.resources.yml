a:
  indexName: a_search
  fields:
    - name: searchField
    - name: secondaryField
  relations:
    - resource: b
      key:
        source: a
        fields:
          - b_id
      fields:
        - name: name
    - resource: c
      key:
        source: a
        fields:
          - id
      fields:
        - name: number

b:
  indexName: b_search
  fields:
    - name: name

c:
  indexName: c_search
  fields:
    - name: number
  relations:
    - resource: a
      key:
        source: c
        fields:
          - a_id
      fields:
        - name: searchField
    - resource: b
      key:
        source: c
        fields:
          - b_id
      fields:
        - name: name
          # Control whether this field is searchable or not.
          # It will still be filterable, just not available for full text search.
          # Default is true.
          query:
            search: false
